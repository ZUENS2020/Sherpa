name: Deploy Dev

on:
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: "Force rebuild web and frontend images"
        type: boolean
        default: false

permissions:
  contents: read

env:
  NAMESPACE: sherpa-dev
  OVERLAY: k8s/overlays/dev
  DEV_NAMESPACE: sherpa-dev
  DEV_SHARED_ROOT: /shared/dev
  DEV_OUTPUT_DIR: /home/deploy/output/dev
  RESET_DEV_BEFORE_DEPLOY: "true"
  INSTALL_METRICS_SERVER: "true"

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    runs-on: [self-hosted, linux]
    environment: dev
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Resolve deploy target refs
        id: target_ref
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin dev
          target_sha="$(git rev-parse origin/dev)"
          git checkout --detach "${target_sha}"
          checked_out_sha="$(git rev-parse HEAD)"
          base_sha=""
          if git rev-parse --verify "${target_sha}^" >/dev/null 2>&1; then
            base_sha="$(git rev-parse "${target_sha}^")"
          fi
          echo "target_branch=dev" >> "$GITHUB_OUTPUT"
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"
          echo "checked_out_sha=${checked_out_sha}" >> "$GITHUB_OUTPUT"
          echo "::notice::target_branch=dev target_sha=${target_sha} checked_out_sha=${checked_out_sha} base_sha=${base_sha}"

      - name: Guard no GHCR push path
        shell: bash
        run: |
          set -euo pipefail
          file=".github/workflows/deploy-dev.yml"
          if rg -n '^\s*push:\s*true\s*$' "$file"; then
            echo "::error::Forbidden remote image push configuration found in $file"
            exit 1
          fi

      - name: Setup kubectl (self-hosted fast path)
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client --output=yaml >/dev/null
            exit 0
          fi
          KVER="${KUBECTL_VERSION:-v1.30.5}"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) KARCH="amd64" ;;
            aarch64|arm64) KARCH="arm64" ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          for base in \
            "https://mirrors.aliyun.com/kubernetes-new/core/stable" \
            "https://dl.k8s.io/release"; do
            if curl --retry 5 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 180 -fsSL "${base}/${KVER}/bin/linux/${KARCH}/kubectl" -o /tmp/kubectl; then
              sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
              rm -f /tmp/kubectl
              kubectl version --client --output=yaml >/dev/null
              exit 0
            fi
          done
          echo "Failed to install kubectl" >&2
          exit 1

      - name: Configure kubeconfig
        id: kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.kube

          selected=""
          selected_source=""
          runner_is_self_hosted="false"
          if [[ "${RUNNER_ENVIRONMENT:-}" == "self-hosted" ]]; then
            runner_is_self_hosted="true"
          fi

          select_candidate() {
            local source="$1"
            local path="$2"
            if [[ -z "$path" || ! -f "$path" ]]; then
              return 1
            fi
            if KUBECONFIG="$path" kubectl version --request-timeout=10s >/tmp/kubectl-version.log 2>&1; then
              selected="$path"
              selected_source="$source"
              return 0
            fi
            return 1
          }

          select_candidate_via_sudo_copy() {
            local source="$1"
            local path="$2"
            local tmp_copy
            if [[ -z "$path" ]]; then
              return 1
            fi
            tmp_copy="$(mktemp)"
            if sudo cp "$path" "$tmp_copy" 2>/dev/null; then
              chmod 600 "$tmp_copy"
              if select_candidate "$source" "$tmp_copy"; then
                return 0
              fi
            fi
            rm -f "$tmp_copy"
            return 1
          }

          if [[ "$runner_is_self_hosted" == "true" ]]; then
            if [[ -n "${KUBECONFIG:-}" ]]; then
              IFS=':' read -r first_kubeconfig _ <<< "${KUBECONFIG}"
              select_candidate "runner-kubeconfig-env" "$first_kubeconfig" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate "runner-home" "$HOME/.kube/config" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate_via_sudo_copy "runner-k3s" "/etc/rancher/k3s/k3s.yaml" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate_via_sudo_copy "runner-kubeadm" "/etc/kubernetes/admin.conf" || true
            fi
          fi

          if [[ -z "$selected" && -n "${KUBE_CONFIG_B64:-}" ]]; then
            tmp_kubeconfig="$(mktemp)"
            trap 'rm -f "$tmp_kubeconfig"' EXIT
            if echo "${KUBE_CONFIG_B64}" | base64 --decode > "$tmp_kubeconfig" 2>/dev/null; then
              if select_candidate "github-secret" "$tmp_kubeconfig"; then
                :
              else
                echo "::warning::GitHub kubeconfig secret decoded but is not reachable from this runner."
              fi
            else
              echo "::warning::Failed to decode GitHub kubeconfig secret."
            fi
          fi

          if [[ -z "$selected" ]]; then
            echo "::warning::No reachable kubeconfig found on runner or in GitHub secret."
            if [[ -n "${KUBECONFIG:-}" ]]; then
              IFS=':' read -r first_kubeconfig _ <<< "${KUBECONFIG}"
              if [[ -f "$first_kubeconfig" ]]; then
                selected="$first_kubeconfig"
                selected_source="runner-kubeconfig-env-unreachable"
              fi
            fi
            if [[ -z "$selected" && -f "$HOME/.kube/config" ]]; then
              selected="$HOME/.kube/config"
              selected_source="runner-home-unreachable"
            fi
            if [[ -z "$selected" && -n "${KUBE_CONFIG_B64:-}" ]]; then
              tmp_kubeconfig="$(mktemp)"
              trap 'rm -f "$tmp_kubeconfig"' EXIT
              echo "${KUBE_CONFIG_B64}" | base64 --decode > "$tmp_kubeconfig"
              selected="$tmp_kubeconfig"
              selected_source="github-secret-unreachable"
            fi
          fi

          if [[ -z "$selected" ]]; then
            echo "::error::Unable to locate any kubeconfig file."
            exit 1
          fi

          if [[ "$selected" != "$HOME/.kube/config" ]]; then
            cp "$selected" ~/.kube/config
          fi
          chmod 600 ~/.kube/config

          echo "source=${selected_source}" >> "$GITHUB_OUTPUT"
          echo "path=${selected}" >> "$GITHUB_OUTPUT"
          echo "::notice::Using kubeconfig source=${selected_source} path=${selected}"
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64_DEV }}

      - name: Preflight Kubernetes connectivity
        id: kube_preflight
        shell: bash
        run: |
          set -euo pipefail
          server="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null || true)"
          echo "server=${server}" >> "$GITHUB_OUTPUT"
          if [[ -z "${server}" ]]; then
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Kubernetes server is empty in kubeconfig; skipping deploy steps."
            exit 0
          fi
          if echo "${server}" | grep -Eq 'https?://(127\.0\.0\.1|localhost)(:|/|$)'; then
            if [[ "${RUNNER_ENVIRONMENT:-}" != "self-hosted" ]]; then
              echo "reachable=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Kubernetes server points to localhost (${server}); skipping deploy steps on non-self-hosted runner."
              exit 0
            fi
            echo "::notice::Kubernetes server points to localhost (${server}) on self-hosted runner; continuing."
          fi
          if kubectl version --request-timeout=10s >/tmp/kubectl-version.log 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cannot reach Kubernetes API server (${server}); skipping deploy steps."
          fi

      - name: Skip deploy steps note
        if: steps.kube_preflight.outputs.reachable != 'true'
        shell: bash
        run: |
          echo "Skip deploy steps because Kubernetes is unreachable from this runner."

      - name: Install and verify metrics-server
        if: steps.kube_preflight.outputs.reachable == 'true' && env.INSTALL_METRICS_SERVER == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # If metrics API is already healthy, skip reconcile to avoid unnecessary rollouts.
          if kubectl top nodes >/tmp/metrics-top.log 2>&1; then
            echo "::notice::metrics-server already healthy; skip reinstall"
            exit 0
          fi

          manifest_urls=(
            "https://ghfast.top/https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml"
            "https://mirror.ghproxy.com/https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml"
            "https://github.moeyy.xyz/https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml"
            "https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml"
          )
          applied=0
          for u in "${manifest_urls[@]}"; do
            if curl --retry 5 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 120 -fsSL "$u" -o /tmp/metrics-server-components.yaml; then
              kubectl apply -f /tmp/metrics-server-components.yaml
              applied=1
              break
            fi
          done
          if [[ "$applied" != "1" ]]; then
            echo "::error::Failed to download metrics-server manifest"
            exit 1
          fi

          current_image="$(kubectl -n kube-system get deploy metrics-server -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
          tag="$(printf '%s' "${current_image}" | sed -E 's|.*:([^:]+)$|\1|')"
          if [[ -z "${tag}" || "${tag}" == "${current_image}" ]]; then
            tag="v0.8.1"
          fi
          image_candidates=(
            "registry.cn-hangzhou.aliyuncs.com/google_containers/metrics-server:${tag}"
            "registry.aliyuncs.com/google_containers/metrics-server:${tag}"
            "k8s.m.daocloud.io/metrics-server/metrics-server:${tag}"
            "registry.k8s.io/metrics-server/metrics-server:${tag}"
          )

          # Set deterministic args (avoid repeated duplicate entries).
          kubectl -n kube-system set args deployment/metrics-server \
            --containers=metrics-server \
            -- \
            --cert-dir=/tmp \
            --secure-port=10250 \
            --kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP \
            --kubelet-use-node-status-port \
            --metric-resolution=15s \
            --kubelet-insecure-tls || true

          rollout_metrics_server() {
            # Proactively clear stuck terminating pods before waiting rollout.
            kubectl -n kube-system get pods -l k8s-app=metrics-server \
              -o jsonpath='{range .items[*]}{.metadata.name} {.metadata.deletionTimestamp}{"\n"}{end}' | \
              awk '$2!=""{print $1}' | \
              xargs -r -I{} kubectl -n kube-system delete pod {} --force --grace-period=0 --wait=false || true
            for img in "${image_candidates[@]}"; do
              echo "[metrics-server] trying image: ${img}"
              kubectl -n kube-system set image deployment/metrics-server metrics-server="${img}" || true
              if kubectl -n kube-system rollout status deployment/metrics-server --timeout=300s; then
                return 0
              fi
              echo "::warning::metrics-server rollout failed with image ${img}; trying next mirror"
              kubectl -n kube-system get pods -l k8s-app=metrics-server -o wide || true
              kubectl -n kube-system describe pod -l k8s-app=metrics-server | tail -n 120 || true
            done
            return 1
          }

          rollout_metrics_server
          kubectl wait --for=condition=Available apiservice/v1beta1.metrics.k8s.io --timeout=240s
          kubectl top nodes

      - name: Reset dev environment
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RESET_DEV_BEFORE_DEPLOY}" != "true" ]]; then
            echo "::error::RESET_DEV_BEFORE_DEPLOY must be true for dev fresh deployment"
            exit 1
          fi
          if [[ "${NAMESPACE}" != "${DEV_NAMESPACE}" || "${DEV_NAMESPACE}" != "sherpa-dev" ]]; then
            echo "::error::Unsafe namespace guard triggered: NAMESPACE=${NAMESPACE}, DEV_NAMESPACE=${DEV_NAMESPACE}"
            exit 1
          fi

          echo "[reset] deleting namespace ${DEV_NAMESPACE}"
          kubectl delete namespace "${DEV_NAMESPACE}" --ignore-not-found=true --wait=true --timeout=300s || true

          if kubectl get namespace "${DEV_NAMESPACE}" >/dev/null 2>&1; then
            echo "[reset] namespace still terminating, removing finalizers"
            kubectl patch namespace "${DEV_NAMESPACE}" --type=merge -p '{"spec":{"finalizers":[]}}' || true
            kubectl wait --for=delete namespace/"${DEV_NAMESPACE}" --timeout=120s || true
          fi

          echo "[reset] deleting retained dev PVs"
          kubectl delete pv \
            pv-sherpa-dev-postgres \
            pv-sherpa-dev-config \
            pv-sherpa-dev-job-logs \
            pv-sherpa-dev-oss-fuzz \
            pv-sherpa-dev-shared-output \
            pv-sherpa-dev-shared-tmp \
            --ignore-not-found=true || true

          echo "[reset] cleaning ${DEV_SHARED_ROOT}"
          sudo mkdir -p "${DEV_SHARED_ROOT}"
          sudo mkdir -p "${DEV_OUTPUT_DIR}"
          for d in \
            "${DEV_SHARED_ROOT}/postgres" \
            "${DEV_SHARED_ROOT}/config" \
            "${DEV_SHARED_ROOT}/job-logs" \
            "${DEV_SHARED_ROOT}/oss-fuzz" \
            "${DEV_SHARED_ROOT}/tmp" \
            "${DEV_OUTPUT_DIR}"; do
            sudo mkdir -p "$d"
            sudo find "$d" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          done
          sudo chown -R 999:999 "${DEV_SHARED_ROOT}/postgres"
          sudo chown -R 10001:10001 \
            "${DEV_SHARED_ROOT}/config" \
            "${DEV_SHARED_ROOT}/job-logs" \
            "${DEV_SHARED_ROOT}/oss-fuzz" \
            "${DEV_SHARED_ROOT}/tmp" \
            "${DEV_OUTPUT_DIR}"
          sudo chmod -R a+rwX \
            "${DEV_SHARED_ROOT}/config" \
            "${DEV_SHARED_ROOT}/job-logs" \
            "${DEV_SHARED_ROOT}/oss-fuzz" \
            "${DEV_SHARED_ROOT}/tmp" \
            "${DEV_OUTPUT_DIR}"

      - name: Create or update runtime secrets
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY_DEV }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL_DEV || vars.MINIMAX_MODEL_DEV || 'MiniMax-M2.7-highspeed' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_DEV }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB_DEV || 'sherpa' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER_DEV || 'sherpa' }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_DEV }}
          CLOUDFLARE_PUBLIC_HOST: ${{ secrets.CLOUDFLARE_PUBLIC_HOST_DEV }}
          RUNTIME_HTTP_PROXY: ${{ secrets.RUNTIME_HTTP_PROXY_DEV }}
          RUNTIME_HTTPS_PROXY: ${{ secrets.RUNTIME_HTTPS_PROXY_DEV }}
          RUNTIME_ALL_PROXY: ${{ secrets.RUNTIME_ALL_PROXY_DEV }}
          RUNTIME_NO_PROXY: ${{ secrets.RUNTIME_NO_PROXY_DEV }}
        run: |
          set -euo pipefail

          current_secret_value() {
            local secret_name="$1"
            local key_name="$2"
            local encoded
            encoded="$(kubectl -n "${NAMESPACE}" get secret "${secret_name}" -o "jsonpath={.data.${key_name}}" 2>/dev/null || true)"
            if [ -z "$encoded" ]; then
              echo ""
              return 0
            fi
            printf '%s' "$encoded" | base64 --decode 2>/dev/null || true
          }

          require_non_empty() {
            local env_name="$1"
            local secret_name="$2"
            local key_name="$3"
            local value="${!env_name:-}"
            if [ -n "$value" ]; then
              return 0
            fi
            local current
            current="$(current_secret_value "$secret_name" "$key_name")"
            if [ -n "$current" ]; then
              echo "[error] ${env_name} is empty; refusing to overwrite existing ${secret_name}/${key_name}." >&2
            else
              echo "[error] ${env_name} is empty and ${secret_name}/${key_name} is not present in cluster." >&2
            fi
            exit 1
          }

          apply_optional_runtime_proxy_secret() {
            local secret_name="sherpa-runtime-proxy"
            local args=()
            local http_proxy="${RUNTIME_HTTP_PROXY:-}"
            local https_proxy="${RUNTIME_HTTPS_PROXY:-}"
            local all_proxy="${RUNTIME_ALL_PROXY:-}"
            local no_proxy="${RUNTIME_NO_PROXY:-}"

            if [[ -n "$http_proxy" ]]; then
              args+=(--from-literal=HTTP_PROXY="${http_proxy}" --from-literal=http_proxy="${http_proxy}")
            fi
            if [[ -n "$https_proxy" ]]; then
              args+=(--from-literal=HTTPS_PROXY="${https_proxy}" --from-literal=https_proxy="${https_proxy}")
            fi
            if [[ -n "$all_proxy" ]]; then
              args+=(--from-literal=ALL_PROXY="${all_proxy}" --from-literal=all_proxy="${all_proxy}")
            fi
            if [[ -n "$no_proxy" ]]; then
              args+=(--from-literal=NO_PROXY="${no_proxy}" --from-literal=no_proxy="${no_proxy}")
            fi

            if [[ ${#args[@]} -eq 0 ]]; then
              kubectl -n "${NAMESPACE}" delete secret "${secret_name}" --ignore-not-found=true
              return 0
            fi

            kubectl -n "${NAMESPACE}" create secret generic "${secret_name}" \
              "${args[@]}" \
              --dry-run=client -o yaml | kubectl apply -f -
          }

          require_non_empty MINIMAX_API_KEY sherpa-minimax MINIMAX_API_KEY
          require_non_empty POSTGRES_PASSWORD sherpa-postgres POSTGRES_PASSWORD
          require_non_empty CLOUDFLARE_TUNNEL_TOKEN cloudflare-tunnel token
          require_non_empty CLOUDFLARE_PUBLIC_HOST cloudflare-public-host host

          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic sherpa-minimax \
            --from-literal=MINIMAX_API_KEY="${MINIMAX_API_KEY}" \
            --from-literal=MINIMAX_BASE_URL="https://api.minimaxi.com/anthropic/v1" \
            --from-literal=MINIMAX_MODEL="${MINIMAX_MODEL}" \
            --from-literal=OPENAI_API_KEY="${MINIMAX_API_KEY}" \
            --from-literal=OPENAI_BASE_URL="https://api.minimaxi.com/anthropic/v1" \
            --from-literal=OPENAI_MODEL="${MINIMAX_MODEL}" \
            --from-literal=OPENCODE_MODEL="${MINIMAX_MODEL}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic sherpa-postgres \
            --from-literal=POSTGRES_DB="${POSTGRES_DB}" \
            --from-literal=POSTGRES_USER="${POSTGRES_USER}" \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --from-literal=DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic cloudflare-tunnel \
            --from-literal=token="${CLOUDFLARE_TUNNEL_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic cloudflare-public-host \
            --from-literal=host="${CLOUDFLARE_PUBLIC_HOST}" \
            --dry-run=client -o yaml | kubectl apply -f -

          apply_optional_runtime_proxy_secret

      - name: Prepare dev hostPath directories
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p \
            "${DEV_SHARED_ROOT}/postgres" \
            "${DEV_SHARED_ROOT}/config" \
            "${DEV_SHARED_ROOT}/job-logs" \
            "${DEV_SHARED_ROOT}/oss-fuzz" \
            "${DEV_SHARED_ROOT}/tmp" \
            "${DEV_OUTPUT_DIR}"
          sudo chown -R 999:999 "${DEV_SHARED_ROOT}/postgres"
          sudo chown -R 10001:10001 \
            "${DEV_SHARED_ROOT}/config" \
            "${DEV_SHARED_ROOT}/job-logs" \
            "${DEV_SHARED_ROOT}/oss-fuzz" \
            "${DEV_SHARED_ROOT}/tmp" \
            "${DEV_OUTPUT_DIR}"
          sudo chmod -R a+rwX \
            "${DEV_SHARED_ROOT}/config" \
            "${DEV_SHARED_ROOT}/job-logs" \
            "${DEV_SHARED_ROOT}/oss-fuzz" \
            "${DEV_SHARED_ROOT}/tmp" \
            "${DEV_OUTPUT_DIR}"

      - name: Deploy overlay
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -k "${OVERLAY}"

      - name: Prepare local image refs
        if: steps.kube_preflight.outputs.reachable == 'true'
        id: prep
        shell: bash
        env:
          TARGET_SHA: ${{ steps.target_ref.outputs.target_sha }}
        run: |
          set -euo pipefail
          sha="${TARGET_SHA:-${GITHUB_SHA}}"
          echo "web_image=sherpa-web:${sha}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=sherpa-frontend:${sha}" >> "$GITHUB_OUTPUT"
          echo "web_tar=/tmp/sherpa-web-${sha}.tar" >> "$GITHUB_OUTPUT"
          echo "frontend_tar=/tmp/sherpa-frontend-${sha}.tar" >> "$GITHUB_OUTPUT"
          echo "::notice::image_tag_sha=${sha}"

      - name: Decide image rebuild scope
        if: steps.kube_preflight.outputs.reachable == 'true'
        id: rebuild_scope
        shell: bash
        env:
          FORCE_REBUILD_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild_all || 'false' }}
          TARGET_SHA: ${{ steps.target_ref.outputs.target_sha }}
          BASE_SHA: ${{ steps.target_ref.outputs.base_sha }}
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
        run: |
          set -euo pipefail
          web_changed=false
          frontend_changed=false
          change_detection_uncertain=false

          if [[ "${FORCE_REBUILD_ALL}" == "true" ]]; then
            web_changed=true
            frontend_changed=true
          else
            changed_files=""
            if [[ -n "${BASE_SHA}" && -n "${TARGET_SHA}" ]]; then
              if ! changed_files="$(git diff --name-only "${BASE_SHA}" "${TARGET_SHA}")"; then
                change_detection_uncertain=true
                changed_files=""
                echo "::warning::git diff ${BASE_SHA}..${TARGET_SHA} failed; falling back to safe rebuild."
              fi
            else
              change_detection_uncertain=true
              echo "::warning::No valid target/base commit baseline for change detection; falling back to safe rebuild."
            fi

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              case "$file" in
                docker/Dockerfile.web|docker/requirements.web.txt|harness_generator/*|k8s/*|scripts/*)
                  web_changed=true
                  ;;
              esac
              case "$file" in
                docker/Dockerfile.frontend|frontend-next/*|sherpa-frontend/*)
                  frontend_changed=true
                  ;;
              esac
            done <<< "${changed_files}"

            if [[ "${change_detection_uncertain}" == "true" ]]; then
              web_changed=true
              frontend_changed=true
            fi
          fi

          # Dev reset reapplies manifests that default to :latest. If target sha-tag
          # image is absent on node, force rebuild to avoid silently rolling back UI/API.
          if [[ "${{ runner.environment }}" == "self-hosted" ]]; then
            ctr_cmd=(sudo ctr -n k8s.io)
            if sudo test -S /run/k3s/containerd/containerd.sock; then
              ctr_cmd=(sudo ctr --address /run/k3s/containerd/containerd.sock -n k8s.io)
            fi

            image_present() {
              local image="$1"
              "${ctr_cmd[@]}" images ls | awk '{print $1}' | grep -Fx "${image}" >/dev/null 2>&1
            }

            if [[ "${web_changed}" != "true" ]] && ! image_present "${WEB_IMAGE}"; then
              web_changed=true
              echo "::notice::forcing web rebuild because ${WEB_IMAGE} not present in containerd"
            fi
            if [[ "${frontend_changed}" != "true" ]] && ! image_present "${FRONTEND_IMAGE}"; then
              frontend_changed=true
              echo "::notice::forcing frontend rebuild because ${FRONTEND_IMAGE} not present in containerd"
            fi
          fi

          echo "web_changed=${web_changed}" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=${frontend_changed}" >> "$GITHUB_OUTPUT"
          echo "::notice::target_sha=${TARGET_SHA}, base_sha=${BASE_SHA}, force_rebuild_all=${FORCE_REBUILD_ALL}, uncertain=${change_detection_uncertain}, web_changed=${web_changed}, frontend_changed=${frontend_changed}"

      - name: Resolve base images
        id: base_images
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          web_python_image="${WEB_PYTHON_BASE_IMAGE_DEV:-python:3.10-slim}"
          frontend_node_image="${FRONTEND_NODE_IMAGE_DEV:-node:20-alpine}"
          echo "web_python_image=${web_python_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_node_image=${frontend_node_image}" >> "$GITHUB_OUTPUT"
          echo "::notice::web_python_image=${web_python_image}"
          echo "::notice::frontend_node_image=${frontend_node_image}"
        env:
          WEB_PYTHON_BASE_IMAGE_DEV: ${{ secrets.WEB_PYTHON_BASE_IMAGE_DEV }}
          FRONTEND_NODE_IMAGE_DEV: ${{ secrets.FRONTEND_NODE_IMAGE_DEV }}

      - name: Build and export web image
        if: steps.kube_preflight.outputs.reachable == 'true' && steps.rebuild_scope.outputs.web_changed == 'true'
        timeout-minutes: 75
        shell: bash
        env:
          WEB_PYTHON_IMAGE: ${{ steps.base_images.outputs.web_python_image }}
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          WEB_TAR: ${{ steps.prep.outputs.web_tar }}
        run: |
          set -euo pipefail
          DOCKER_BUILDKIT=0 docker build \
            --file docker/Dockerfile.web \
            --build-arg "WEB_PYTHON_BASE_IMAGE=${WEB_PYTHON_IMAGE}" \
            --tag "${WEB_IMAGE}" \
            .
          docker save -o "${WEB_TAR}" "${WEB_IMAGE}"

      - name: Build and export frontend image (attempt 1)
        if: steps.kube_preflight.outputs.reachable == 'true' && steps.rebuild_scope.outputs.frontend_changed == 'true'
        id: frontend_build_1
        continue-on-error: true
        timeout-minutes: 20
        shell: bash
        env:
          FRONTEND_NODE_IMAGE_BASE: ${{ steps.base_images.outputs.frontend_node_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          FRONTEND_TAR: ${{ steps.prep.outputs.frontend_tar }}
        run: |
          set -euo pipefail
          DOCKER_BUILDKIT=0 docker build \
            --file docker/Dockerfile.frontend \
            --build-arg "FRONTEND_NODE_IMAGE=${FRONTEND_NODE_IMAGE_BASE}" \
            --tag "${FRONTEND_IMAGE}" \
            .
          docker save -o "${FRONTEND_TAR}" "${FRONTEND_IMAGE}"

      - name: Build and export frontend image (attempt 2)
        if: steps.kube_preflight.outputs.reachable == 'true' && steps.rebuild_scope.outputs.frontend_changed == 'true' && steps.frontend_build_1.outcome == 'failure'
        id: frontend_build_2
        timeout-minutes: 20
        shell: bash
        env:
          FRONTEND_NODE_IMAGE_BASE: ${{ steps.base_images.outputs.frontend_node_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          FRONTEND_TAR: ${{ steps.prep.outputs.frontend_tar }}
        run: |
          set -euo pipefail
          DOCKER_BUILDKIT=0 docker build \
            --file docker/Dockerfile.frontend \
            --build-arg "FRONTEND_NODE_IMAGE=${FRONTEND_NODE_IMAGE_BASE}" \
            --tag "${FRONTEND_IMAGE}" \
            .
          docker save -o "${FRONTEND_TAR}" "${FRONTEND_IMAGE}"

      - name: Cleanup legacy dev tunnel in shared namespace
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n sherpa delete deploy cloudflared-dev --ignore-not-found=true
          kubectl -n sherpa delete configmap cloudflared-dev-proxy-config --ignore-not-found=true
          kubectl -n sherpa delete secret cloudflare-tunnel-dev --ignore-not-found=true

      - name: Cleanup legacy shared tunnel
        if: steps.kube_preflight.outputs.reachable == 'true' && env.NAMESPACE != 'sherpa'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n sherpa delete deploy cloudflared --ignore-not-found=true
          kubectl -n sherpa delete configmap cloudflared-proxy-config --ignore-not-found=true
          kubectl -n sherpa delete secret cloudflare-tunnel --ignore-not-found=true
          kubectl -n sherpa delete secret cloudflare-public-host --ignore-not-found=true

      - name: Deploy cloudflared tunnel
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat <<'YAML' | kubectl -n "${NAMESPACE}" apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cloudflared-proxy-config
          data:
            default.conf: |
              server {
                listen 80;
                server_name _;

                location /api/ {
                  proxy_pass http://sherpa-web:8001/api/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                }

                location / {
                  proxy_pass http://sherpa-frontend:3000/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                }
              }
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cloudflared
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: cloudflared
            template:
              metadata:
                labels:
                  app: cloudflared
              spec:
                containers:
                  - name: cloudflared
                    image: cloudflare/cloudflared:latest
                    args:
                      - tunnel
                      - --no-autoupdate
                      - --protocol
                      - http2
                      - run
                      - --token
                      - $(TUNNEL_TOKEN)
                    env:
                      - name: TUNNEL_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: cloudflare-tunnel
                            key: token
                  - name: loopback-proxy
                    image: nginx:1.27-alpine
                    ports:
                      - containerPort: 80
                        name: http
                    volumeMounts:
                      - name: loopback-nginx-conf
                        mountPath: /etc/nginx/conf.d/default.conf
                        subPath: default.conf
                volumes:
                  - name: loopback-nginx-conf
                    configMap:
                      name: cloudflared-proxy-config
          YAML

      - name: Patch ingress host from secret
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          host="$(kubectl -n "${NAMESPACE}" get secret cloudflare-public-host -o jsonpath='{.data.host}' | base64 --decode)"
          kubectl -n "${NAMESPACE}" patch ingress sherpa --type=json \
            -p="[{\"op\":\"replace\",\"path\":\"/spec/rules/0/host\",\"value\":\"${host}\"}]"


      - name: Import web image into containerd
        if: steps.kube_preflight.outputs.reachable == 'true' && runner.environment == 'self-hosted' && steps.rebuild_scope.outputs.web_changed == 'true'
        timeout-minutes: 30
        shell: bash
        env:
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          WEB_TAR: ${{ steps.prep.outputs.web_tar }}
        run: |
          set -euo pipefail

          ctr_cmd=(sudo ctr -n k8s.io)
          if sudo test -S /run/k3s/containerd/containerd.sock; then
            ctr_cmd=(sudo ctr --address /run/k3s/containerd/containerd.sock -n k8s.io)
          fi

          import_one() {
            local tar_path="$1"
            local image="$2"
            echo "[import] importing ${image} from ${tar_path}"
            timeout 1800s "${ctr_cmd[@]}" images import "${tar_path}"
            "${ctr_cmd[@]}" images ls | grep -F "${image}" >/dev/null
          }

          import_one "${WEB_TAR}" "${WEB_IMAGE}"
          rm -f "${WEB_TAR}"

      - name: Import frontend image into containerd
        if: steps.kube_preflight.outputs.reachable == 'true' && runner.environment == 'self-hosted' && steps.rebuild_scope.outputs.frontend_changed == 'true'
        timeout-minutes: 30
        shell: bash
        env:
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          FRONTEND_TAR: ${{ steps.prep.outputs.frontend_tar }}
        run: |
          set -euo pipefail

          ctr_cmd=(sudo ctr -n k8s.io)
          if sudo test -S /run/k3s/containerd/containerd.sock; then
            ctr_cmd=(sudo ctr --address /run/k3s/containerd/containerd.sock -n k8s.io)
          fi

          import_one() {
            local tar_path="$1"
            local image="$2"
            echo "[import] importing ${image} from ${tar_path}"
            timeout 1800s "${ctr_cmd[@]}" images import "${tar_path}"
            "${ctr_cmd[@]}" images ls | grep -F "${image}" >/dev/null
          }

          import_one "${FRONTEND_TAR}" "${FRONTEND_IMAGE}"
          rm -f "${FRONTEND_TAR}"

      - name: Pin images and worker image
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        env:
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          WEB_CHANGED: ${{ steps.rebuild_scope.outputs.web_changed }}
          FRONTEND_CHANGED: ${{ steps.rebuild_scope.outputs.frontend_changed }}
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" patch configmap sherpa-config --type merge \
            -p "{\"data\":{\"SHERPA_K8S_WORKER_IMAGE\":\"${WEB_IMAGE}\"}}"
          patched_worker_image="$(kubectl -n "${NAMESPACE}" get configmap sherpa-config -o jsonpath='{.data.SHERPA_K8S_WORKER_IMAGE}')"
          echo "::notice::worker image patched to ${patched_worker_image}"
          if [[ "${patched_worker_image}" != "${WEB_IMAGE}" ]]; then
            echo "::error::worker image patch mismatch expected=${WEB_IMAGE} actual=${patched_worker_image}"
            exit 1
          fi
          if [[ "${WEB_CHANGED}" == "true" ]]; then
            kubectl -n "${NAMESPACE}" set image deployment/sherpa-web web="${WEB_IMAGE}"
            echo "::notice::sherpa-web rollout requested image=${WEB_IMAGE}"
          else
            echo "::notice::Skip sherpa-web rollout (web_changed=false)"
          fi
          if [[ "${FRONTEND_CHANGED}" == "true" ]]; then
            kubectl -n "${NAMESPACE}" set image deployment/sherpa-frontend frontend="${FRONTEND_IMAGE}"
          else
            echo "::notice::Skip sherpa-frontend image pin (frontend_changed=false)"
          fi

      - name: Wait for rollout
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" rollout status statefulset/postgres --timeout=300s

          rollout_with_retry() {
            local kind="$1"
            local name="$2"
            local timeout="$3"
            if kubectl -n "${NAMESPACE}" rollout status "${kind}/${name}" --timeout="${timeout}"; then
              return 0
            fi
            echo "::warning::${kind}/${name} rollout exceeded ${timeout}; collecting diagnostics before retry"
            kubectl -n "${NAMESPACE}" get "${kind}/${name}" -o wide || true
            kubectl -n "${NAMESPACE}" describe "${kind}/${name}" || true
            kubectl -n "${NAMESPACE}" get pods -o wide || true
            kubectl -n "${NAMESPACE}" get events --sort-by=.lastTimestamp | tail -n 40 || true
            kubectl -n "${NAMESPACE}" rollout status "${kind}/${name}" --timeout=300s
          }

          rollout_with_retry deployment sherpa-web 600s
          kubectl -n "${NAMESPACE}" rollout status deployment/sherpa-frontend --timeout=300s
          kubectl -n "${NAMESPACE}" rollout status deployment/cloudflared --timeout=300s

      - name: Validate deployed image consistency
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        env:
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          WEB_CHANGED: ${{ steps.rebuild_scope.outputs.web_changed }}
        run: |
          set -euo pipefail
          worker_cfg_image="$(kubectl -n "${NAMESPACE}" get configmap sherpa-config -o jsonpath='{.data.SHERPA_K8S_WORKER_IMAGE}')"
          web_deploy_image="$(kubectl -n "${NAMESPACE}" get deployment sherpa-web -o jsonpath='{.spec.template.spec.containers[?(@.name==\"web\")].image}')"
          echo "::notice::consistency worker_cfg_image=${worker_cfg_image}"
          echo "::notice::consistency web_deploy_image=${web_deploy_image}"
          if [[ "${worker_cfg_image}" != "${WEB_IMAGE}" ]]; then
            echo "::error::worker configmap image mismatch expected=${WEB_IMAGE} actual=${worker_cfg_image}"
            exit 1
          fi
          if [[ "${WEB_CHANGED}" == "true" && "${web_deploy_image}" != "${WEB_IMAGE}" ]]; then
            echo "::error::web deployment image mismatch expected=${WEB_IMAGE} actual=${web_deploy_image}"
            exit 1
          fi
          latest_worker_pod="$(kubectl -n "${NAMESPACE}" get pods --sort-by=.metadata.creationTimestamp -o custom-columns=NAME:.metadata.name --no-headers | grep '^sherpa-fuzz-' | tail -n 1 || true)"
          if [[ -n "${latest_worker_pod}" ]]; then
            worker_pod_image="$(kubectl -n "${NAMESPACE}" get pod "${latest_worker_pod}" -o jsonpath='{.spec.containers[0].image}')"
            echo "::notice::consistency worker_pod=${latest_worker_pod} image=${worker_pod_image}"
            if [[ "${worker_pod_image}" != "${WEB_IMAGE}" ]]; then
              echo "::error::latest worker pod image mismatch expected=${WEB_IMAGE} actual=${worker_pod_image}"
              exit 1
            fi
          else
            echo "::notice::no sherpa-fuzz worker pod found for runtime image check"
          fi

      - name: Health check
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" port-forward svc/sherpa-web 18001:8001 >/tmp/pf-web.log 2>&1 &
          pf_pid=$!
          cleanup() {
            kill "${pf_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            if ! kill -0 "${pf_pid}" >/dev/null 2>&1; then
              echo "::error::port-forward exited early"
              cat /tmp/pf-web.log || true
              exit 1
            fi
            if curl -fsS --max-time 2 http://127.0.0.1:18001/api/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18001/api/health
