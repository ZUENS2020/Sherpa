name: Deploy Dev

on:
  pull_request:
    branches: ["dev"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: sherpa-dev
  OVERLAY: k8s/overlays/dev
  DEV_NAMESPACE: sherpa-dev
  DEV_SHARED_ROOT: /shared/dev
  RESET_DEV_BEFORE_DEPLOY: "true"

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, linux]
    environment: dev
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["hfnaroxd1op1q2.xuanyuan.run", "hfnaroxd1op1q2.xuanyuan.dev"]

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sha="${{ github.event.pull_request.head.sha }}"
          else
            sha="${GITHUB_SHA}"
          fi
          echo "web_image=${REGISTRY}/${owner_lc}/sherpa-web:${sha}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${owner_lc}/sherpa-frontend:${sha}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        timeout-minutes: 75
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ steps.prep.outputs.web_image }}
          cache-from: type=gha,scope=sherpa-web
          cache-to: type=gha,mode=max,scope=sherpa-web

      - name: Build and push frontend image (attempt 1)
        id: frontend_build_1
        continue-on-error: true
        timeout-minutes: 20
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.prep.outputs.frontend_image }}
          cache-from: type=gha,scope=sherpa-frontend
          cache-to: type=gha,mode=max,scope=sherpa-frontend

      - name: Build and push frontend image (attempt 2)
        if: steps.frontend_build_1.outcome == 'failure'
        id: frontend_build_2
        timeout-minutes: 20
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.prep.outputs.frontend_image }}
          cache-from: type=gha,scope=sherpa-frontend
          cache-to: type=gha,mode=max,scope=sherpa-frontend

      - name: Setup kubectl (self-hosted fast path)
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client --output=yaml >/dev/null
            exit 0
          fi
          KVER="${KUBECTL_VERSION:-v1.30.5}"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) KARCH="amd64" ;;
            aarch64|arm64) KARCH="arm64" ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          for base in \
            "https://mirrors.aliyun.com/kubernetes-new/core/stable" \
            "https://dl.k8s.io/release"; do
            if curl --retry 5 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 180 -fsSL "${base}/${KVER}/bin/linux/${KARCH}/kubectl" -o /tmp/kubectl; then
              sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
              rm -f /tmp/kubectl
              kubectl version --client --output=yaml >/dev/null
              exit 0
            fi
          done
          echo "Failed to install kubectl" >&2
          exit 1

      - name: Configure kubeconfig
        id: kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.kube

          selected=""
          selected_source=""
          runner_is_self_hosted="false"
          if [[ "${RUNNER_ENVIRONMENT:-}" == "self-hosted" ]]; then
            runner_is_self_hosted="true"
          fi

          select_candidate() {
            local source="$1"
            local path="$2"
            if [[ -z "$path" || ! -f "$path" ]]; then
              return 1
            fi
            if KUBECONFIG="$path" kubectl version --request-timeout=10s >/tmp/kubectl-version.log 2>&1; then
              selected="$path"
              selected_source="$source"
              return 0
            fi
            return 1
          }

          select_candidate_via_sudo_copy() {
            local source="$1"
            local path="$2"
            local tmp_copy
            if [[ -z "$path" ]]; then
              return 1
            fi
            tmp_copy="$(mktemp)"
            if sudo cp "$path" "$tmp_copy" 2>/dev/null; then
              chmod 600 "$tmp_copy"
              if select_candidate "$source" "$tmp_copy"; then
                return 0
              fi
            fi
            rm -f "$tmp_copy"
            return 1
          }

          if [[ "$runner_is_self_hosted" == "true" ]]; then
            if [[ -n "${KUBECONFIG:-}" ]]; then
              IFS=':' read -r first_kubeconfig _ <<< "${KUBECONFIG}"
              select_candidate "runner-kubeconfig-env" "$first_kubeconfig" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate "runner-home" "$HOME/.kube/config" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate_via_sudo_copy "runner-k3s" "/etc/rancher/k3s/k3s.yaml" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate_via_sudo_copy "runner-kubeadm" "/etc/kubernetes/admin.conf" || true
            fi
          fi

          if [[ -z "$selected" && -n "${KUBE_CONFIG_B64:-}" ]]; then
            tmp_kubeconfig="$(mktemp)"
            trap 'rm -f "$tmp_kubeconfig"' EXIT
            if echo "${KUBE_CONFIG_B64}" | base64 --decode > "$tmp_kubeconfig" 2>/dev/null; then
              if select_candidate "github-secret" "$tmp_kubeconfig"; then
                :
              else
                echo "::warning::GitHub kubeconfig secret decoded but is not reachable from this runner."
              fi
            else
              echo "::warning::Failed to decode GitHub kubeconfig secret."
            fi
          fi

          if [[ -z "$selected" ]]; then
            echo "::warning::No reachable kubeconfig found on runner or in GitHub secret."
            if [[ -n "${KUBECONFIG:-}" ]]; then
              IFS=':' read -r first_kubeconfig _ <<< "${KUBECONFIG}"
              if [[ -f "$first_kubeconfig" ]]; then
                selected="$first_kubeconfig"
                selected_source="runner-kubeconfig-env-unreachable"
              fi
            fi
            if [[ -z "$selected" && -f "$HOME/.kube/config" ]]; then
              selected="$HOME/.kube/config"
              selected_source="runner-home-unreachable"
            fi
            if [[ -z "$selected" && -n "${KUBE_CONFIG_B64:-}" ]]; then
              tmp_kubeconfig="$(mktemp)"
              trap 'rm -f "$tmp_kubeconfig"' EXIT
              echo "${KUBE_CONFIG_B64}" | base64 --decode > "$tmp_kubeconfig"
              selected="$tmp_kubeconfig"
              selected_source="github-secret-unreachable"
            fi
          fi

          if [[ -z "$selected" ]]; then
            echo "::error::Unable to locate any kubeconfig file."
            exit 1
          fi

          if [[ "$selected" != "$HOME/.kube/config" ]]; then
            cp "$selected" ~/.kube/config
          fi
          chmod 600 ~/.kube/config

          echo "source=${selected_source}" >> "$GITHUB_OUTPUT"
          echo "path=${selected}" >> "$GITHUB_OUTPUT"
          echo "::notice::Using kubeconfig source=${selected_source} path=${selected}"
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64_DEV }}

      - name: Preflight Kubernetes connectivity
        id: kube_preflight
        shell: bash
        run: |
          set -euo pipefail
          server="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null || true)"
          echo "server=${server}" >> "$GITHUB_OUTPUT"
          if [[ -z "${server}" ]]; then
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Kubernetes server is empty in kubeconfig; skipping deploy steps."
            exit 0
          fi
          if echo "${server}" | grep -Eq 'https?://(127\.0\.0\.1|localhost)(:|/|$)'; then
            if [[ "${RUNNER_ENVIRONMENT:-}" != "self-hosted" ]]; then
              echo "reachable=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Kubernetes server points to localhost (${server}); skipping deploy steps on non-self-hosted runner."
              exit 0
            fi
            echo "::notice::Kubernetes server points to localhost (${server}) on self-hosted runner; continuing."
          fi
          if kubectl version --request-timeout=10s >/tmp/kubectl-version.log 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cannot reach Kubernetes API server (${server}); skipping deploy steps."
          fi

      - name: Skip deploy steps note
        if: steps.kube_preflight.outputs.reachable != 'true'
        shell: bash
        run: |
          echo "Skip deploy steps because Kubernetes is unreachable from this runner."

      - name: Reset dev environment
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RESET_DEV_BEFORE_DEPLOY}" != "true" ]]; then
            echo "::error::RESET_DEV_BEFORE_DEPLOY must be true for dev fresh deployment"
            exit 1
          fi
          if [[ "${NAMESPACE}" != "${DEV_NAMESPACE}" || "${DEV_NAMESPACE}" != "sherpa-dev" ]]; then
            echo "::error::Unsafe namespace guard triggered: NAMESPACE=${NAMESPACE}, DEV_NAMESPACE=${DEV_NAMESPACE}"
            exit 1
          fi

          echo "[reset] deleting namespace ${DEV_NAMESPACE}"
          kubectl delete namespace "${DEV_NAMESPACE}" --ignore-not-found=true --wait=true --timeout=300s || true

          if kubectl get namespace "${DEV_NAMESPACE}" >/dev/null 2>&1; then
            echo "[reset] namespace still terminating, removing finalizers"
            kubectl patch namespace "${DEV_NAMESPACE}" --type=merge -p '{"spec":{"finalizers":[]}}' || true
            kubectl wait --for=delete namespace/"${DEV_NAMESPACE}" --timeout=120s || true
          fi

          echo "[reset] deleting retained dev PVs"
          kubectl delete pv \
            pv-sherpa-dev-postgres \
            pv-sherpa-dev-config \
            pv-sherpa-dev-job-logs \
            pv-sherpa-dev-oss-fuzz \
            pv-sherpa-dev-shared-output \
            pv-sherpa-dev-shared-tmp \
            --ignore-not-found=true || true

          echo "[reset] cleaning ${DEV_SHARED_ROOT}"
          sudo mkdir -p "${DEV_SHARED_ROOT}"
          sudo rm -rf "${DEV_SHARED_ROOT:?}/"*
          sudo mkdir -p \
            "${DEV_SHARED_ROOT}/postgres" \
            "${DEV_SHARED_ROOT}/config" \
            "${DEV_SHARED_ROOT}/job-logs" \
            "${DEV_SHARED_ROOT}/oss-fuzz" \
            "${DEV_SHARED_ROOT}/output" \
            "${DEV_SHARED_ROOT}/tmp"
          sudo chown -R "$(id -u):$(id -g)" "${DEV_SHARED_ROOT}"

      - name: Create or update runtime secrets
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY_DEV }}
          MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL_DEV || 'MiniMax-M2.5' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_DEV }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB_DEV || 'sherpa' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER_DEV || 'sherpa' }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_DEV }}
          CLOUDFLARE_PUBLIC_HOST: ${{ secrets.CLOUDFLARE_PUBLIC_HOST_DEV }}
        run: |
          set -euo pipefail
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic sherpa-minimax \
            --from-literal=MINIMAX_API_KEY="${MINIMAX_API_KEY}" \
            --from-literal=MINIMAX_BASE_URL="https://api.minimaxi.com/anthropic/v1" \
            --from-literal=MINIMAX_MODEL="${MINIMAX_MODEL}" \
            --from-literal=OPENAI_API_KEY="${MINIMAX_API_KEY}" \
            --from-literal=OPENAI_BASE_URL="https://api.minimaxi.com/anthropic/v1" \
            --from-literal=OPENAI_MODEL="${MINIMAX_MODEL}" \
            --from-literal=OPENCODE_MODEL="${MINIMAX_MODEL}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic sherpa-postgres \
            --from-literal=POSTGRES_DB="${POSTGRES_DB}" \
            --from-literal=POSTGRES_USER="${POSTGRES_USER}" \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --from-literal=DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic cloudflare-tunnel \
            --from-literal=token="${CLOUDFLARE_TUNNEL_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic cloudflare-public-host \
            --from-literal=host="${CLOUDFLARE_PUBLIC_HOST}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Prepare dev hostPath directories
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p "${DEV_SHARED_ROOT}/postgres" "${DEV_SHARED_ROOT}/config" "${DEV_SHARED_ROOT}/job-logs" "${DEV_SHARED_ROOT}/oss-fuzz" "${DEV_SHARED_ROOT}/output" "${DEV_SHARED_ROOT}/tmp"
          sudo chown -R "$(id -u):$(id -g)" "${DEV_SHARED_ROOT}"

      - name: Deploy overlay
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -k "${OVERLAY}"

      - name: Cleanup legacy dev tunnel in shared namespace
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n sherpa delete deploy cloudflared-dev --ignore-not-found=true
          kubectl -n sherpa delete configmap cloudflared-dev-proxy-config --ignore-not-found=true
          kubectl -n sherpa delete secret cloudflare-tunnel-dev --ignore-not-found=true

      - name: Deploy cloudflared tunnel
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat <<'YAML' | kubectl -n "${NAMESPACE}" apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cloudflared-proxy-config
          data:
            default.conf: |
              server {
                listen 80;
                server_name _;

                location /api/ {
                  proxy_pass http://sherpa-web:8001/api/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                }

                location / {
                  proxy_pass http://sherpa-frontend:3000/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                }
              }
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cloudflared
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: cloudflared
            template:
              metadata:
                labels:
                  app: cloudflared
              spec:
                containers:
                  - name: cloudflared
                    image: cloudflare/cloudflared:latest
                    args:
                      - tunnel
                      - --no-autoupdate
                      - --protocol
                      - http2
                      - run
                      - --token
                      - $(TUNNEL_TOKEN)
                    env:
                      - name: TUNNEL_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: cloudflare-tunnel
                            key: token
                  - name: loopback-proxy
                    image: nginx:1.27-alpine
                    ports:
                      - containerPort: 80
                        name: http
                    volumeMounts:
                      - name: loopback-nginx-conf
                        mountPath: /etc/nginx/conf.d/default.conf
                        subPath: default.conf
                volumes:
                  - name: loopback-nginx-conf
                    configMap:
                      name: cloudflared-proxy-config
          YAML

      - name: Patch ingress host from secret
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          host="$(kubectl -n "${NAMESPACE}" get secret cloudflare-public-host -o jsonpath='{.data.host}' | base64 --decode)"
          kubectl -n "${NAMESPACE}" patch ingress sherpa --type=json \
            -p="[{\"op\":\"replace\",\"path\":\"/spec/rules/0/host\",\"value\":\"${host}\"}]"


      - name: Pre-pull web and frontend images on runner node
        if: steps.kube_preflight.outputs.reachable == 'true' && runner.environment == 'self-hosted'
        timeout-minutes: 30
        shell: bash
        env:
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
        run: |
          set -euo pipefail

          cri_args=()
          if sudo test -S /run/k3s/containerd/containerd.sock; then
            cri_args+=(--runtime-endpoint unix:///run/k3s/containerd/containerd.sock)
          elif sudo test -S /run/containerd/containerd.sock; then
            cri_args+=(--runtime-endpoint unix:///run/containerd/containerd.sock)
          fi

          pull_one() {
            local image="$1"
            echo "[pre-pull] pulling ${image}"
            if command -v crictl >/dev/null 2>&1; then
              sudo crictl "${cri_args[@]}" pull "${image}"
              return 0
            fi
            if command -v ctr >/dev/null 2>&1; then
              sudo ctr -n k8s.io images pull "${image}"
              return 0
            fi
            echo "::error::Neither crictl nor ctr is available on the runner node"
            return 1
          }

          pull_one "${WEB_IMAGE}"
          pull_one "${FRONTEND_IMAGE}"

      - name: Pin images and worker image
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        env:
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" patch configmap sherpa-config --type merge \
            -p "{\"data\":{\"SHERPA_K8S_WORKER_IMAGE\":\"${WEB_IMAGE}\"}}"
          kubectl -n "${NAMESPACE}" set image deployment/sherpa-web web="${WEB_IMAGE}"
          kubectl -n "${NAMESPACE}" set image deployment/sherpa-frontend frontend="${FRONTEND_IMAGE}"

      - name: Wait for rollout
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" rollout status statefulset/postgres --timeout=300s

          rollout_with_retry() {
            local kind="$1"
            local name="$2"
            local timeout="$3"
            if kubectl -n "${NAMESPACE}" rollout status "${kind}/${name}" --timeout="${timeout}"; then
              return 0
            fi
            echo "::warning::${kind}/${name} rollout exceeded ${timeout}; collecting diagnostics before retry"
            kubectl -n "${NAMESPACE}" get "${kind}/${name}" -o wide || true
            kubectl -n "${NAMESPACE}" describe "${kind}/${name}" || true
            kubectl -n "${NAMESPACE}" get pods -o wide || true
            kubectl -n "${NAMESPACE}" get events --sort-by=.lastTimestamp | tail -n 40 || true
            kubectl -n "${NAMESPACE}" rollout status "${kind}/${name}" --timeout=300s
          }

          rollout_with_retry deployment sherpa-web 600s
          kubectl -n "${NAMESPACE}" rollout status deployment/sherpa-frontend --timeout=300s
          kubectl -n "${NAMESPACE}" rollout status deployment/cloudflared --timeout=300s

      - name: Health check
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" port-forward svc/sherpa-web 18001:8001 >/tmp/pf-web.log 2>&1 &
          pf_pid=$!
          cleanup() {
            kill "${pf_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sleep 3
          curl -fsS http://127.0.0.1:18001/api/health
