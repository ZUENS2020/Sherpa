name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: "Force rebuild web and frontend images"
        type: boolean
        default: false
  pull_request:
    types: [closed]
    branches: ["main"]

permissions:
  contents: read

env:
  NAMESPACE: sherpa-prod
  OVERLAY: k8s/overlays/prod
  RESET_PROD_BEFORE_DEPLOY: "false"
  PROD_SHARED_ROOT: /shared/prod
  PROD_OUTPUT_DIR: /home/deploy/output/prod

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-prod:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: [self-hosted, linux]
    environment: prod
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard no GHCR push path
        shell: bash
        run: |
          set -euo pipefail
          file=".github/workflows/deploy-prod.yml"
          if rg -n '^\s*push:\s*true\s*$' "$file"; then
            echo "::error::Forbidden remote image push configuration found in $file"
            exit 1
          fi

      - name: Setup kubectl (self-hosted fast path)
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client --output=yaml >/dev/null
            exit 0
          fi
          KVER="${KUBECTL_VERSION:-v1.30.5}"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) KARCH="amd64" ;;
            aarch64|arm64) KARCH="arm64" ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          for base in \
            "https://mirrors.aliyun.com/kubernetes-new/core/stable" \
            "https://dl.k8s.io/release"; do
            if curl --retry 5 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 180 -fsSL "${base}/${KVER}/bin/linux/${KARCH}/kubectl" -o /tmp/kubectl; then
              sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
              rm -f /tmp/kubectl
              kubectl version --client --output=yaml >/dev/null
              exit 0
            fi
          done
          echo "Failed to install kubectl" >&2
          exit 1

      - name: Configure kubeconfig
        id: kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.kube

          selected=""
          selected_source=""
          runner_is_self_hosted="false"
          if [[ "${RUNNER_ENVIRONMENT:-}" == "self-hosted" ]]; then
            runner_is_self_hosted="true"
          fi

          select_candidate() {
            local source="$1"
            local path="$2"
            if [[ -z "$path" || ! -f "$path" ]]; then
              return 1
            fi
            if KUBECONFIG="$path" kubectl version --request-timeout=10s >/tmp/kubectl-version.log 2>&1; then
              selected="$path"
              selected_source="$source"
              return 0
            fi
            return 1
          }

          select_candidate_via_sudo_copy() {
            local source="$1"
            local path="$2"
            local tmp_copy
            if [[ -z "$path" ]]; then
              return 1
            fi
            tmp_copy="$(mktemp)"
            if sudo cp "$path" "$tmp_copy" 2>/dev/null; then
              chmod 600 "$tmp_copy"
              if select_candidate "$source" "$tmp_copy"; then
                return 0
              fi
            fi
            rm -f "$tmp_copy"
            return 1
          }

          if [[ "$runner_is_self_hosted" == "true" ]]; then
            if [[ -n "${KUBECONFIG:-}" ]]; then
              IFS=':' read -r first_kubeconfig _ <<< "${KUBECONFIG}"
              select_candidate "runner-kubeconfig-env" "$first_kubeconfig" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate "runner-home" "$HOME/.kube/config" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate_via_sudo_copy "runner-k3s" "/etc/rancher/k3s/k3s.yaml" || true
            fi
            if [[ -z "$selected" ]]; then
              select_candidate_via_sudo_copy "runner-kubeadm" "/etc/kubernetes/admin.conf" || true
            fi
          fi

          if [[ -z "$selected" && -n "${KUBE_CONFIG_B64:-}" ]]; then
            tmp_kubeconfig="$(mktemp)"
            trap 'rm -f "$tmp_kubeconfig"' EXIT
            if echo "${KUBE_CONFIG_B64}" | base64 --decode > "$tmp_kubeconfig" 2>/dev/null; then
              if select_candidate "github-secret" "$tmp_kubeconfig"; then
                :
              else
                echo "::warning::GitHub kubeconfig secret decoded but is not reachable from this runner."
              fi
            else
              echo "::warning::Failed to decode GitHub kubeconfig secret."
            fi
          fi

          if [[ -z "$selected" ]]; then
            echo "::warning::No reachable kubeconfig found on runner or in GitHub secret."
            if [[ -n "${KUBECONFIG:-}" ]]; then
              IFS=':' read -r first_kubeconfig _ <<< "${KUBECONFIG}"
              if [[ -f "$first_kubeconfig" ]]; then
                selected="$first_kubeconfig"
                selected_source="runner-kubeconfig-env-unreachable"
              fi
            fi
            if [[ -z "$selected" && -f "$HOME/.kube/config" ]]; then
              selected="$HOME/.kube/config"
              selected_source="runner-home-unreachable"
            fi
            if [[ -z "$selected" && -n "${KUBE_CONFIG_B64:-}" ]]; then
              tmp_kubeconfig="$(mktemp)"
              trap 'rm -f "$tmp_kubeconfig"' EXIT
              echo "${KUBE_CONFIG_B64}" | base64 --decode > "$tmp_kubeconfig"
              selected="$tmp_kubeconfig"
              selected_source="github-secret-unreachable"
            fi
          fi

          if [[ -z "$selected" ]]; then
            echo "::error::Unable to locate any kubeconfig file."
            exit 1
          fi

          if [[ "$selected" != "$HOME/.kube/config" ]]; then
            cp "$selected" ~/.kube/config
          fi
          chmod 600 ~/.kube/config

          echo "source=${selected_source}" >> "$GITHUB_OUTPUT"
          echo "path=${selected}" >> "$GITHUB_OUTPUT"
          echo "::notice::Using kubeconfig source=${selected_source} path=${selected}"
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64_PROD }}

      - name: Preflight Kubernetes connectivity
        id: kube_preflight
        shell: bash
        run: |
          set -euo pipefail
          server="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null || true)"
          echo "server=${server}" >> "$GITHUB_OUTPUT"
          if [[ -z "${server}" ]]; then
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Kubernetes server is empty in kubeconfig; skipping deploy steps."
            exit 0
          fi
          if echo "${server}" | grep -Eq 'https?://(127\.0\.0\.1|localhost)(:|/|$)'; then
            if [[ "${RUNNER_ENVIRONMENT:-}" != "self-hosted" ]]; then
              echo "reachable=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Kubernetes server points to localhost (${server}); skipping deploy steps on non-self-hosted runner."
              exit 0
            fi
            echo "::notice::Kubernetes server points to localhost (${server}) on self-hosted runner; continuing."
          fi
          if kubectl version --request-timeout=10s >/tmp/kubectl-version.log 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cannot reach Kubernetes API server (${server}); skipping deploy steps."
          fi

      - name: Skip deploy steps note
        if: steps.kube_preflight.outputs.reachable != 'true'
        shell: bash
        run: |
          echo "Skip deploy steps because Kubernetes is unreachable from this runner."

      - name: Guardrail (prod no reset)
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RESET_PROD_BEFORE_DEPLOY}" != "false" ]]; then
            echo "::error::RESET_PROD_BEFORE_DEPLOY must stay false in prod"
            exit 1
          fi
          if [[ "${NAMESPACE}" != "sherpa-prod" ]]; then
            echo "::error::Unexpected prod namespace: ${NAMESPACE}"
            exit 1
          fi

      - name: Create or update runtime secrets
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY_PROD }}
          MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL_PROD || 'MiniMax-M2.5' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_PROD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB_PROD || 'sherpa' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER_PROD || 'sherpa' }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_PROD }}
          CLOUDFLARE_PUBLIC_HOST: ${{ secrets.CLOUDFLARE_PUBLIC_HOST_PROD }}
        run: |
          set -euo pipefail

          current_secret_value() {
            local secret_name="$1"
            local key_name="$2"
            local encoded
            encoded="$(kubectl -n "${NAMESPACE}" get secret "${secret_name}" -o "jsonpath={.data.${key_name}}" 2>/dev/null || true)"
            if [ -z "$encoded" ]; then
              echo ""
              return 0
            fi
            printf '%s' "$encoded" | base64 --decode 2>/dev/null || true
          }

          require_non_empty() {
            local env_name="$1"
            local secret_name="$2"
            local key_name="$3"
            local value="${!env_name:-}"
            if [ -n "$value" ]; then
              return 0
            fi
            local current
            current="$(current_secret_value "$secret_name" "$key_name")"
            if [ -n "$current" ]; then
              echo "[error] ${env_name} is empty; refusing to overwrite existing ${secret_name}/${key_name}." >&2
            else
              echo "[error] ${env_name} is empty and ${secret_name}/${key_name} is not present in cluster." >&2
            fi
            exit 1
          }

          require_non_empty MINIMAX_API_KEY sherpa-minimax MINIMAX_API_KEY
          require_non_empty POSTGRES_PASSWORD sherpa-postgres POSTGRES_PASSWORD
          require_non_empty CLOUDFLARE_TUNNEL_TOKEN cloudflare-tunnel token
          require_non_empty CLOUDFLARE_PUBLIC_HOST cloudflare-public-host host

          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic sherpa-minimax \
            --from-literal=MINIMAX_API_KEY="${MINIMAX_API_KEY}" \
            --from-literal=MINIMAX_BASE_URL="https://api.minimaxi.com/anthropic/v1" \
            --from-literal=MINIMAX_MODEL="${MINIMAX_MODEL}" \
            --from-literal=OPENAI_API_KEY="${MINIMAX_API_KEY}" \
            --from-literal=OPENAI_BASE_URL="https://api.minimaxi.com/anthropic/v1" \
            --from-literal=OPENAI_MODEL="${MINIMAX_MODEL}" \
            --from-literal=OPENCODE_MODEL="${MINIMAX_MODEL}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic sherpa-postgres \
            --from-literal=POSTGRES_DB="${POSTGRES_DB}" \
            --from-literal=POSTGRES_USER="${POSTGRES_USER}" \
            --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
            --from-literal=DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic cloudflare-tunnel \
            --from-literal=token="${CLOUDFLARE_TUNNEL_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "${NAMESPACE}" create secret generic cloudflare-public-host \
            --from-literal=host="${CLOUDFLARE_PUBLIC_HOST}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Prepare prod hostPath directories
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p \
            "${PROD_SHARED_ROOT}/postgres" \
            "${PROD_SHARED_ROOT}/config" \
            "${PROD_SHARED_ROOT}/job-logs" \
            "${PROD_SHARED_ROOT}/oss-fuzz" \
            "${PROD_SHARED_ROOT}/tmp" \
            "${PROD_OUTPUT_DIR}"
          sudo chown -R 999:999 "${PROD_SHARED_ROOT}/postgres"
          sudo chown -R 10001:10001 \
            "${PROD_SHARED_ROOT}/config" \
            "${PROD_SHARED_ROOT}/job-logs" \
            "${PROD_SHARED_ROOT}/oss-fuzz" \
            "${PROD_SHARED_ROOT}/tmp" \
            "${PROD_OUTPUT_DIR}"
          sudo chmod -R a+rwX \
            "${PROD_SHARED_ROOT}/config" \
            "${PROD_SHARED_ROOT}/job-logs" \
            "${PROD_SHARED_ROOT}/oss-fuzz" \
            "${PROD_SHARED_ROOT}/tmp" \
            "${PROD_OUTPUT_DIR}"

      - name: Deploy overlay
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -k "${OVERLAY}"

      - name: Prepare local image refs
        if: steps.kube_preflight.outputs.reachable == 'true'
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sha="${GITHUB_SHA}"
          else
            sha="${{ github.event.pull_request.merge_commit_sha }}"
          fi
          echo "web_image=sherpa-web:${sha}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=sherpa-frontend:${sha}" >> "$GITHUB_OUTPUT"
          echo "web_tar=/tmp/sherpa-web-${sha}.tar" >> "$GITHUB_OUTPUT"
          echo "frontend_tar=/tmp/sherpa-frontend-${sha}.tar" >> "$GITHUB_OUTPUT"

      - name: Decide image rebuild scope
        if: steps.kube_preflight.outputs.reachable == 'true'
        id: rebuild_scope
        shell: bash
        env:
          FORCE_REBUILD_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild_all || 'false' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
        run: |
          set -euo pipefail
          web_changed=false
          frontend_changed=false
          change_detection_uncertain=false

          if [[ "${FORCE_REBUILD_ALL}" == "true" ]]; then
            web_changed=true
            frontend_changed=true
          else
            changed_files=""
            if [[ "${{ github.event_name }}" == "pull_request" && -n "${PR_BASE_SHA}" && -n "${PR_HEAD_SHA}" ]]; then
              if ! git fetch --no-tags --prune origin "${PR_BASE_SHA}" "${PR_HEAD_SHA}"; then
                change_detection_uncertain=true
                echo "::warning::git fetch failed when detecting changed files; falling back to safe rebuild."
              fi
              if ! changed_files="$(git diff --name-only "${PR_BASE_SHA}" "${PR_HEAD_SHA}")"; then
                change_detection_uncertain=true
                changed_files=""
                echo "::warning::git diff failed when detecting changed files; falling back to safe rebuild."
              fi
            elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              if ! changed_files="$(git diff --name-only HEAD~1 HEAD)"; then
                change_detection_uncertain=true
                changed_files=""
                echo "::warning::git diff HEAD~1..HEAD failed; falling back to safe rebuild."
              fi
            else
              change_detection_uncertain=true
              echo "::warning::No valid git baseline for change detection; falling back to safe rebuild."
            fi

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              case "$file" in
                docker/Dockerfile.web|docker/requirements.web.txt|harness_generator/*|k8s/*|scripts/*)
                  web_changed=true
                  ;;
              esac
              case "$file" in
                docker/Dockerfile.frontend|frontend-next/*|sherpa-frontend/*)
                  frontend_changed=true
                  ;;
              esac
            done <<< "${changed_files}"

            if [[ "${change_detection_uncertain}" == "true" ]]; then
              web_changed=true
              frontend_changed=true
            fi
          fi

          if [[ "${{ runner.environment }}" == "self-hosted" ]]; then
            ctr_cmd=(sudo ctr -n k8s.io)
            if sudo test -S /run/k3s/containerd/containerd.sock; then
              ctr_cmd=(sudo ctr --address /run/k3s/containerd/containerd.sock -n k8s.io)
            fi

            image_present() {
              local image="$1"
              "${ctr_cmd[@]}" images ls | awk '{print $1}' | grep -Fx "${image}" >/dev/null 2>&1
            }

            if [[ "${web_changed}" != "true" ]] && ! image_present "${WEB_IMAGE}"; then
              web_changed=true
              echo "::notice::forcing web rebuild because ${WEB_IMAGE} not present in containerd"
            fi
            if [[ "${frontend_changed}" != "true" ]] && ! image_present "${FRONTEND_IMAGE}"; then
              frontend_changed=true
              echo "::notice::forcing frontend rebuild because ${FRONTEND_IMAGE} not present in containerd"
            fi
          fi

          echo "web_changed=${web_changed}" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=${frontend_changed}" >> "$GITHUB_OUTPUT"
          echo "::notice::force_rebuild_all=${FORCE_REBUILD_ALL}, uncertain=${change_detection_uncertain}, web_changed=${web_changed}, frontend_changed=${frontend_changed}"

      - name: Resolve base images
        id: base_images
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          web_python_image="${WEB_PYTHON_BASE_IMAGE_PROD:-python:3.10-slim}"
          frontend_node_image="${FRONTEND_NODE_IMAGE_PROD:-node:20-alpine}"
          echo "web_python_image=${web_python_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_node_image=${frontend_node_image}" >> "$GITHUB_OUTPUT"
          echo "::notice::web_python_image=${web_python_image}"
          echo "::notice::frontend_node_image=${frontend_node_image}"
        env:
          WEB_PYTHON_BASE_IMAGE_PROD: ${{ secrets.WEB_PYTHON_BASE_IMAGE_PROD }}
          FRONTEND_NODE_IMAGE_PROD: ${{ secrets.FRONTEND_NODE_IMAGE_PROD }}

      - name: Build and export web image
        if: steps.kube_preflight.outputs.reachable == 'true' && steps.rebuild_scope.outputs.web_changed == 'true'
        timeout-minutes: 75
        shell: bash
        env:
          WEB_PYTHON_IMAGE: ${{ steps.base_images.outputs.web_python_image }}
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          WEB_TAR: ${{ steps.prep.outputs.web_tar }}
        run: |
          set -euo pipefail
          DOCKER_BUILDKIT=0 docker build \
            --file docker/Dockerfile.web \
            --build-arg "WEB_PYTHON_BASE_IMAGE=${WEB_PYTHON_IMAGE}" \
            --tag "${WEB_IMAGE}" \
            .
          docker save -o "${WEB_TAR}" "${WEB_IMAGE}"

      - name: Build and export frontend image (attempt 1)
        if: steps.kube_preflight.outputs.reachable == 'true' && steps.rebuild_scope.outputs.frontend_changed == 'true'
        id: frontend_build_1
        continue-on-error: true
        timeout-minutes: 20
        shell: bash
        env:
          FRONTEND_NODE_IMAGE_BASE: ${{ steps.base_images.outputs.frontend_node_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          FRONTEND_TAR: ${{ steps.prep.outputs.frontend_tar }}
        run: |
          set -euo pipefail
          DOCKER_BUILDKIT=0 docker build \
            --file docker/Dockerfile.frontend \
            --build-arg "FRONTEND_NODE_IMAGE=${FRONTEND_NODE_IMAGE_BASE}" \
            --tag "${FRONTEND_IMAGE}" \
            .
          docker save -o "${FRONTEND_TAR}" "${FRONTEND_IMAGE}"

      - name: Build and export frontend image (attempt 2)
        if: steps.kube_preflight.outputs.reachable == 'true' && steps.rebuild_scope.outputs.frontend_changed == 'true' && steps.frontend_build_1.outcome == 'failure'
        id: frontend_build_2
        timeout-minutes: 20
        shell: bash
        env:
          FRONTEND_NODE_IMAGE_BASE: ${{ steps.base_images.outputs.frontend_node_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          FRONTEND_TAR: ${{ steps.prep.outputs.frontend_tar }}
        run: |
          set -euo pipefail
          DOCKER_BUILDKIT=0 docker build \
            --file docker/Dockerfile.frontend \
            --build-arg "FRONTEND_NODE_IMAGE=${FRONTEND_NODE_IMAGE_BASE}" \
            --tag "${FRONTEND_IMAGE}" \
            .
          docker save -o "${FRONTEND_TAR}" "${FRONTEND_IMAGE}"

      - name: Deploy cloudflared tunnel
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat <<'YAML' | kubectl -n "${NAMESPACE}" apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cloudflared-proxy-config
          data:
            default.conf: |
              server {
                listen 80;
                server_name _;

                location /api/ {
                  proxy_pass http://sherpa-web:8001/api/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                }

                location / {
                  proxy_pass http://sherpa-frontend:3000/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                }
              }
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cloudflared
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: cloudflared
            template:
              metadata:
                labels:
                  app: cloudflared
              spec:
                containers:
                  - name: cloudflared
                    image: cloudflare/cloudflared:latest
                    args:
                      - tunnel
                      - --no-autoupdate
                      - --protocol
                      - http2
                      - run
                      - --token
                      - $(TUNNEL_TOKEN)
                    env:
                      - name: TUNNEL_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: cloudflare-tunnel
                            key: token
                  - name: loopback-proxy
                    image: nginx:1.27-alpine
                    ports:
                      - containerPort: 80
                        name: http
                    volumeMounts:
                      - name: loopback-nginx-conf
                        mountPath: /etc/nginx/conf.d/default.conf
                        subPath: default.conf
                volumes:
                  - name: loopback-nginx-conf
                    configMap:
                      name: cloudflared-proxy-config
          YAML

      - name: Patch ingress host from secret
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          host="$(kubectl -n "${NAMESPACE}" get secret cloudflare-public-host -o jsonpath='{.data.host}' | base64 --decode)"
          kubectl -n "${NAMESPACE}" patch ingress sherpa --type=json \
            -p="[{\"op\":\"replace\",\"path\":\"/spec/rules/0/host\",\"value\":\"${host}\"}]"


      - name: Import web image into containerd
        if: steps.kube_preflight.outputs.reachable == 'true' && runner.environment == 'self-hosted' && steps.rebuild_scope.outputs.web_changed == 'true'
        timeout-minutes: 30
        shell: bash
        env:
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          WEB_TAR: ${{ steps.prep.outputs.web_tar }}
        run: |
          set -euo pipefail

          ctr_cmd=(sudo ctr -n k8s.io)
          if sudo test -S /run/k3s/containerd/containerd.sock; then
            ctr_cmd=(sudo ctr --address /run/k3s/containerd/containerd.sock -n k8s.io)
          fi

          import_one() {
            local tar_path="$1"
            local image="$2"
            echo "[import] importing ${image} from ${tar_path}"
            timeout 1800s "${ctr_cmd[@]}" images import "${tar_path}"
            "${ctr_cmd[@]}" images ls | grep -F "${image}" >/dev/null
          }

          import_one "${WEB_TAR}" "${WEB_IMAGE}"
          rm -f "${WEB_TAR}"

      - name: Import frontend image into containerd
        if: steps.kube_preflight.outputs.reachable == 'true' && runner.environment == 'self-hosted' && steps.rebuild_scope.outputs.frontend_changed == 'true'
        timeout-minutes: 30
        shell: bash
        env:
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          FRONTEND_TAR: ${{ steps.prep.outputs.frontend_tar }}
        run: |
          set -euo pipefail

          ctr_cmd=(sudo ctr -n k8s.io)
          if sudo test -S /run/k3s/containerd/containerd.sock; then
            ctr_cmd=(sudo ctr --address /run/k3s/containerd/containerd.sock -n k8s.io)
          fi

          import_one() {
            local tar_path="$1"
            local image="$2"
            echo "[import] importing ${image} from ${tar_path}"
            timeout 1800s "${ctr_cmd[@]}" images import "${tar_path}"
            "${ctr_cmd[@]}" images ls | grep -F "${image}" >/dev/null
          }

          import_one "${FRONTEND_TAR}" "${FRONTEND_IMAGE}"
          rm -f "${FRONTEND_TAR}"

      - name: Pin images and worker image
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        env:
          WEB_IMAGE: ${{ steps.prep.outputs.web_image }}
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          WEB_CHANGED: ${{ steps.rebuild_scope.outputs.web_changed }}
          FRONTEND_CHANGED: ${{ steps.rebuild_scope.outputs.frontend_changed }}
        run: |
          set -euo pipefail
          if [[ "${WEB_CHANGED}" == "true" ]]; then
            kubectl -n "${NAMESPACE}" patch configmap sherpa-config --type merge \
              -p "{\"data\":{\"SHERPA_K8S_WORKER_IMAGE\":\"${WEB_IMAGE}\"}}"
            kubectl -n "${NAMESPACE}" set image deployment/sherpa-web web="${WEB_IMAGE}"
          else
            echo "::notice::Skip sherpa-web image pin (web_changed=false)"
          fi
          if [[ "${FRONTEND_CHANGED}" == "true" ]]; then
            kubectl -n "${NAMESPACE}" set image deployment/sherpa-frontend frontend="${FRONTEND_IMAGE}"
          else
            echo "::notice::Skip sherpa-frontend image pin (frontend_changed=false)"
          fi

      - name: Wait for rollout
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" rollout status statefulset/postgres --timeout=300s

          rollout_with_retry() {
            local kind="$1"
            local name="$2"
            local timeout="$3"
            if kubectl -n "${NAMESPACE}" rollout status "${kind}/${name}" --timeout="${timeout}"; then
              return 0
            fi
            echo "::warning::${kind}/${name} rollout exceeded ${timeout}; collecting diagnostics before retry"
            kubectl -n "${NAMESPACE}" get "${kind}/${name}" -o wide || true
            kubectl -n "${NAMESPACE}" describe "${kind}/${name}" || true
            kubectl -n "${NAMESPACE}" get pods -o wide || true
            kubectl -n "${NAMESPACE}" get events --sort-by=.lastTimestamp | tail -n 40 || true
            kubectl -n "${NAMESPACE}" rollout status "${kind}/${name}" --timeout=300s
          }

          rollout_with_retry deployment sherpa-web 600s
          kubectl -n "${NAMESPACE}" rollout status deployment/sherpa-frontend --timeout=300s
          kubectl -n "${NAMESPACE}" rollout status deployment/cloudflared --timeout=300s

      - name: Health check
        if: steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" port-forward svc/sherpa-web 18001:8001 >/tmp/pf-web.log 2>&1 &
          pf_pid=$!
          cleanup() {
            kill "${pf_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            if ! kill -0 "${pf_pid}" >/dev/null 2>&1; then
              echo "::error::port-forward exited early"
              cat /tmp/pf-web.log || true
              exit 1
            fi
            if curl -fsS --max-time 2 http://127.0.0.1:18001/api/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18001/api/health

      - name: Rollback on failure
        if: failure() && steps.kube_preflight.outputs.reachable == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" rollout undo deployment/sherpa-web || true
          kubectl -n "${NAMESPACE}" rollout undo deployment/sherpa-frontend || true
