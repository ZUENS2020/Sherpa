name: PR Deploy Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["dev", "main"]

concurrency:
  group: pr-deploy-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  k8s-manifest-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Build manifests
        shell: bash
        run: |
          set -euo pipefail
          kustomize build k8s/base >/tmp/k8s-base.yaml
          kustomize build k8s/overlays/dev >/tmp/k8s-dev.yaml
          kustomize build k8s/overlays/prod >/tmp/k8s-prod.yaml
          kustomize build k8s/overlays/cloudflare >/tmp/k8s-cloudflare.yaml
          wc -l /tmp/k8s-*.yaml

      - name: Guard rails
        shell: bash
        run: |
          set -euo pipefail
          grep -q "name: sherpa-web" /tmp/k8s-base.yaml
          grep -q "name: sherpa-frontend" /tmp/k8s-base.yaml
          grep -q "name: postgres" /tmp/k8s-base.yaml
          grep -q "name: cloudflared" /tmp/k8s-cloudflare.yaml
          grep -q "name: cloudflared-proxy-config" /tmp/k8s-cloudflare.yaml

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        uses: rhysd/actionlint@v1
