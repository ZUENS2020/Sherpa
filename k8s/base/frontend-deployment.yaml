apiVersion: apps/v1
kind: Deployment
metadata:
  name: sherpa-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sherpa-frontend
  template:
    metadata:
      labels:
        app: sherpa-frontend
    spec:
      containers:
        - name: frontend
          image: sherpa-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: sherpa-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
