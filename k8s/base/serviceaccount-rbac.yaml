apiVersion: v1
kind: ServiceAccount
metadata:
  name: sherpa-web
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sherpa-web-job-manager
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sherpa-web-job-manager
subjects:
  - kind: ServiceAccount
    name: sherpa-web
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sherpa-web-job-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sherpa-web-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sherpa-web-node-reader
subjects:
  - kind: ServiceAccount
    name: sherpa-web
    namespace: sherpa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sherpa-web-node-reader
