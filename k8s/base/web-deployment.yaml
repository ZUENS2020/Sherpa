apiVersion: apps/v1
kind: Deployment
metadata:
  name: sherpa-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sherpa-web
  template:
    metadata:
      labels:
        app: sherpa-web
    spec:
      serviceAccountName: sherpa-web
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: runtime-permissions
          image: sherpa-web:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              set -eu
              for d in /app/config /app/job-logs /shared/tmp /shared/output /shared/oss-fuzz; do
                mkdir -p "$d"
                chown 10001:10001 "$d" || true
                chmod 0775 "$d" || true
                find "$d" -mindepth 1 -exec chown 10001:10001 {} + || true
                find "$d" -mindepth 1 -exec chmod u+rwX,g+rwX {} + || true
              done
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: job-logs
              mountPath: /app/job-logs
            - name: shared-tmp
              mountPath: /shared/tmp
            - name: shared-output
              mountPath: /shared/output
            - name: oss-fuzz
              mountPath: /shared/oss-fuzz
      containers:
        - name: web
          image: sherpa-web:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: sherpa-config
            - secretRef:
                name: sherpa-minimax
            - secretRef:
                name: sherpa-postgres
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: job-logs
              mountPath: /app/job-logs
            - name: shared-tmp
              mountPath: /shared/tmp
            - name: shared-output
              mountPath: /shared/output
            - name: oss-fuzz
              mountPath: /shared/oss-fuzz
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sherpa-config
        - name: job-logs
          persistentVolumeClaim:
            claimName: sherpa-job-logs
        - name: shared-tmp
          persistentVolumeClaim:
            claimName: sherpa-shared-tmp
        - name: shared-output
          persistentVolumeClaim:
            claimName: sherpa-shared-output
        - name: oss-fuzz
          persistentVolumeClaim:
            claimName: sherpa-oss-fuzz
