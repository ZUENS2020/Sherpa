apiVersion: apps/v1
kind: Deployment
metadata:
  name: sherpa-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sherpa-gateway
  template:
    metadata:
      labels:
        app: sherpa-gateway
    spec:
      containers:
        - name: gateway
          image: m.daocloud.io/docker.io/library/nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: gateway-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: gateway-conf
          configMap:
            name: sherpa-gateway-nginx
