apiVersion: v1
kind: ConfigMap
metadata:
  name: sherpa-config
  labels:
    app.kubernetes.io/name: sherpa
data:
  HOST: "0.0.0.0"
  PORT: "8001"
  TMPDIR: "/tmp"
  SHERPA_OUTPUT_DIR: "/shared/output"
  SHERPA_WEB_JOB_LOG_DIR: "/app/job-logs/jobs"
  SHERPA_CODEX_CLI: "opencode"
  SHERPA_EXECUTOR_MODE: "k8s_job"
  SHERPA_K8S_NAMESPACE: "sherpa"
  SHERPA_K8S_WORKER_IMAGE: "sherpa-web:latest"
  SHERPA_K8S_JOB_SERVICE_ACCOUNT: "sherpa-web"
  SHERPA_K8S_PVC_TMP: "sherpa-shared-tmp"
  SHERPA_K8S_PVC_OUTPUT: "sherpa-shared-output"
  SHERPA_K8S_PVC_CONFIG: "sherpa-config"
  SHERPA_K8S_PVC_JOB_LOGS: "sherpa-job-logs"
  SHERPA_K8S_LLM_SECRET_NAME: "sherpa-llm"
  SHERPA_K8S_JOB_MEMORY_LIMIT: "64Gi"
  SHERPA_PARALLEL_FUZZERS: "2"
  SHERPA_RUN_PARALLEL_EARLY_STOP_ENABLED: "0"
  SHERPA_RUN_UNLIMITED_ROUND_BUDGET_SEC: "7200"
  SHERPA_K8S_RUN_TIMEOUT_GRACE_SEC: "900"
  SHERPA_K8S_RUN_TIMEOUT_INTER_ROUND_BUFFER_SEC: "120"
  SHERPA_K8S_RUN_TIMEOUT_MAX_SEC: "0"
  SHERPA_VCPKG_REPO_DIR: "vcpkg"
  SHERPA_VCPKG_INSTALLED_DIR: "vcpkg_installed"
  SHERPA_OPENCODE_IGNORE_RETRY_ERRORS: "1"
  SHERPA_OPENCODE_IDLE_TIMEOUT_SYNTH_SEC: "300"
  SHERPA_GIT_MIRRORS: "https://ghfast.top/{url},https://ghproxy.net/{url},https://github.com"
  SHERPA_K8S_PROXY_SECRET_NAME: "sherpa-runtime-proxy"
  SHERPA_WEB_AUTO_RESUME_ON_START: "0"
  SHERPA_WEB_RESTORE_LOG_MAX_CHARS: "200000"
  NEXT_PUBLIC_API_BASE: "/api"
