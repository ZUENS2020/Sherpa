apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sherpa-prod
labels:
  - pairs:
      app.kubernetes.io/env: prod
    includeSelectors: false
    includeTemplates: true
resources:
  - ../../base
  - namespace.yaml
  - clusterrolebinding-node-reader.yaml
  - pv-prod.yaml
patches:
  - path: namespace-delete-patch.yaml
  - path: configmap-patch.yaml
  - path: ingress-patch.yaml
  - path: node-reader-binding-delete-patch.yaml
  - path: pvc-storageclass-patch.yaml
  - path: postgres-storageclass-patch.yaml
