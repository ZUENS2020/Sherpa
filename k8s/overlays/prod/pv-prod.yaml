apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-sherpa-prod-postgres
spec:
  capacity:
    storage: 30Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /shared/prod/postgres
