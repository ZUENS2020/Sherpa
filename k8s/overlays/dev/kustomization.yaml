apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sherpa-dev
labels:
  - pairs:
      app.kubernetes.io/env: dev
    includeSelectors: false
    includeTemplates: true
resources:
  - ../../base
  - namespace.yaml
  - clusterrolebinding-node-reader.yaml
  - pv-dev.yaml
patchesStrategicMerge:
  - namespace-delete-patch.yaml
  - configmap-patch.yaml
  - ingress-patch.yaml
  - node-reader-binding-delete-patch.yaml
  - pvc-storageclass-patch.yaml
  - postgres-storageclass-patch.yaml
