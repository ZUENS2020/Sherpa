<svg width="1300" height="700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 700">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <marker id="ah-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DC143C"/>
    </marker>
    <marker id="ah-gray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ══════════════ 节点 ══════════════ -->

  <!-- init -->
  <rect x="30" y="195" width="110" height="50" rx="6" fill="#E3F2FD" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="85" y="225" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">init</text>

  <!-- plan -->
  <rect x="195" y="195" width="110" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="250" y="225" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">plan</text>

  <!-- synthesize -->
  <rect x="360" y="195" width="110" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="415" y="225" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">synthesize</text>

  <!-- build -->
  <rect x="525" y="195" width="110" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="580" y="225" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">build</text>

  <!-- run -->
  <rect x="690" y="195" width="110" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="745" y="225" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">run</text>

  <!-- fix_build -->
  <rect x="530" y="60" width="100" height="42" rx="5" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="580" y="86" font-family="Arial,sans-serif" font-size="13" text-anchor="middle">fix_build</text>

  <!-- coverage-analysis -->
  <rect x="870" y="80" width="140" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="940" y="103" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">coverage-</text>
  <text x="940" y="119" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">analysis</text>

  <!-- improve-harness -->
  <rect x="1070" y="80" width="140" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1140" y="103" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">improve-</text>
  <text x="1140" y="119" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">harness</text>

  <!-- crash-triage -->
  <rect x="870" y="310" width="140" height="50" rx="6" fill="#F48FB1" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="940" y="333" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">crash-</text>
  <text x="940" y="349" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">triage</text>

  <!-- fix-harness -->
  <rect x="1070" y="310" width="140" height="50" rx="6" fill="#F48FB1" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1140" y="333" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">fix-</text>
  <text x="1140" y="349" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">harness</text>

  <!-- re-build -->
  <rect x="870" y="440" width="140" height="50" rx="6" fill="#F48FB1" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="940" y="470" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">re-build</text>

  <!-- re-run -->
  <rect x="1070" y="440" width="140" height="50" rx="6" fill="#F48FB1" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1140" y="470" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">re-run</text>

  <!-- crash-analysis -->
  <rect x="1070" y="560" width="140" height="50" rx="6" fill="#CE93D8" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1140" y="583" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">crash-</text>
  <text x="1140" y="599" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">analysis</text>

  <!-- fix_crash (legacy) -->
  <rect x="740" y="445" width="90" height="40" rx="5" fill="#fff" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="785" y="470" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="#999">fix_crash</text>

  <!-- done -->
  <rect x="880" y="570" width="120" height="50" rx="6" fill="#81C784" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="940" y="600" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">done</text>

  <!-- ══════════════ 箭头 — 主线 ══════════════ -->

  <!-- init → plan -->
  <line x1="140" y1="220" x2="195" y2="220" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <!-- plan → synthesize -->
  <line x1="305" y1="220" x2="360" y2="220" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <!-- synthesize → build -->
  <line x1="470" y1="220" x2="525" y2="220" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <!-- build → run -->
  <line x1="635" y1="220" x2="690" y2="220" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ══════════════ 箭头 — build ↔ fix_build ══════════════ -->

  <!-- build → fix_build (上，build failed) -->
  <line x1="567" y1="195" x2="567" y2="102" stroke="#333" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="543" y="153" font-family="Arial,sans-serif" font-size="10" fill="#666" transform="rotate(-90,543,153)">build failed</text>

  <!-- fix_build → build (下) -->
  <line x1="593" y1="102" x2="593" y2="195" stroke="#333" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- fix_build self-loop -->
  <path d="M 530 72 C 510 72 510 88 530 88" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#ah)"/>

  <!-- ══════════════ 箭头 — run → 上方 coverage 路径 ══════════════ -->

  <!-- run → coverage-analysis -->
  <path d="M 800 205 L 830 205 C 850 205 855 105 870 105" fill="none" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="835" y="165" font-family="Arial,sans-serif" font-size="11" fill="#666">no_crash</text>

  <!-- coverage-analysis → improve-harness -->
  <line x1="1010" y1="105" x2="1070" y2="105" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ══════════════ 箭头 — improve-harness → plan (replan) ══════════════ -->

  <path d="M 1140 80 L 1140 30 L 250 30 L 250 195" fill="none" stroke="#DC143C" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#ah-red)"/>
  <text x="700" y="22" font-family="Arial,sans-serif" font-size="12" fill="#DC143C" text-anchor="middle">replan</text>

  <!-- ══════════════ 箭头 — run → 下方 crash 路径 ══════════════ -->

  <!-- run → crash-triage -->
  <path d="M 745 245 L 745 335 L 870 335" fill="none" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="758" y="290" font-family="Arial,sans-serif" font-size="11" fill="#DC143C">crash found</text>

  <!-- crash-triage → fix-harness -->
  <line x1="1010" y1="335" x2="1070" y2="335" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="1040" y="325" font-family="Arial,sans-serif" font-size="10" fill="#666">harness_bug</text>

  <!-- fix-harness → build (回到 build) -->
  <path d="M 1140 310 L 1140 170 L 635 170 L 635 195" fill="none" stroke="#333" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- crash-triage → re-build -->
  <line x1="940" y1="360" x2="940" y2="440" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="953" y="405" font-family="Arial,sans-serif" font-size="10" fill="#666">upstream</text>

  <!-- re-build → re-run -->
  <line x1="1010" y1="465" x2="1070" y2="465" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>

  <!-- re-run → crash-analysis -->
  <line x1="1140" y1="490" x2="1140" y2="560" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>

  <!-- crash-analysis → done -->
  <line x1="1070" y1="585" x2="1000" y2="595" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="1035" y="580" font-family="Arial,sans-serif" font-size="10" fill="#666">real_bug</text>

  <!-- crash-analysis → plan (false_positive, replan) -->
  <path d="M 1140 610 L 1140 670 L 250 670 L 250 245" fill="none" stroke="#DC143C" stroke-width="1.8" stroke-dasharray="8,4" marker-end="url(#ah-red)"/>
  <text x="700" y="663" font-family="Arial,sans-serif" font-size="12" fill="#DC143C" text-anchor="middle">false_positive → replan</text>

  <!-- ══════════════ 箭头 — legacy fix_crash ══════════════ -->

  <!-- re-build → fix_crash -->
  <path d="M 870 465 L 830 465" fill="none" stroke="#999" stroke-width="1.2" marker-end="url(#ah-gray)"/>

  <!-- re-run → fix_crash -->
  <path d="M 1070 475 L 840 475 L 830 465" fill="none" stroke="#999" stroke-width="1.2" marker-end="url(#ah-gray)"/>

  <!-- fix_crash → build -->
  <path d="M 785 445 L 785 170 L 560 170 L 560 195" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah-gray)"/>

  <!-- ══════════════ 箭头 — crash-triage/fix-harness → plan ══════════════ -->

  <!-- crash-triage → plan (如果无法复现) -->
  <path d="M 870 350 L 310 350 L 260 245" fill="none" stroke="#DC143C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah-red)"/>

  <!-- ══════════════ init 扇出标记 ══════════════ -->
  <text x="85" y="265" font-family="Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">可恢复到任意阶段</text>

</svg>